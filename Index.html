<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<div class="scanline"></div>
<div id="wrap">
  <div id="hud">
    <div id="hud-stats-row">
      <div class="hud-stat"><div class="lbl">SCORE</div><div class="val" id="score-val">0</div></div>
      <div class="hud-stat"><div class="lbl">ZAPPED</div><div class="val" id="zapped-val" style="color:#00ffff">0</div></div>
      <div class="hud-stat"><div class="lbl">BURNT</div><div class="val" id="burnt-val" style="color:#ff6600">0</div></div>
      <div id="mult-display-hud"><div class="lbl">MULT</div><div id="mult-val" class="val" style="color:#00ff41;transition:color 0.3s">1.0x</div></div>
    </div>
    <div id="hud-btn-row">
      <button class="hud-btn" id="audio-btn" onclick="toggleAudio()">🔊 SFX</button>
      <button class="hud-btn" id="pause-btn" onclick="togglePause()">⏸ PAUSE</button>
    </div>
    <!-- hidden legacy DOM refs -->
    <span id="status-val" style="display:none">SCANNING</span>
    <span id="threats-val" style="display:none">0</span>
    <span id="mega-val" style="display:none">0</span>
    <span id="combo-val" style="display:none">0</span>
  </div>
  <div id="radar-container">
    <canvas id="radar-canvas" width="560" height="560"></canvas>
    <div id="pause-overlay"><h2>PAUSED</h2><p>— RADAR OFFLINE —</p></div>
  </div>
  <div id="controls">
    <div id="btn-row">
      <button id="ff-btn" onmousedown="startCharge()" onmouseup="stopCharge()" ontouchstart="startCharge(event)" ontouchend="stopCharge()">[ HOLD 3s → FORCEFIELD ]</button>
      <button id="fire-btn" onmousedown="startFireCharge()" onmouseup="stopFireCharge()" ontouchstart="startFireCharge(event)" ontouchend="stopFireCharge()">🔥 FIRE BEAM</button>
    </div>
    <div id="log"><div id="log-inner"></div></div>
  </div>
  <div id="status-bar">
    <div class="sb-item"><span class="sb-lbl">STATUS</span><span id="status-bar-val" style="color:#00ff88">SCANNING</span></div>
    <!-- hidden legacy refs -->
    <span id="threats-bar-val" style="display:none">0</span>
    <span id="mega-bar-val" style="display:none">0</span>
  </div>
</div>
<div id="gameover">
  <h1 id="go-title">GAME OVER</h1>
  <p id="go-msg">An enemy reached the center.</p>
  <p id="go-score"></p>
  <p id="go-high" style="color:#ffdd44;font-size:3.8vw;letter-spacing:2px"></p>
  <button onclick="initGame()">[ RESTART ]</button>
</div>
<script>
const C=document.getElementById('radar-canvas');

const CX=280,CY=280,R=262;

    btn.style.background=`rgba(${60+Math.floor(fl*30)},10,0,1)`;btn.style.boxShadow=`0 0 ${16+fl*18}px rgba(255,80,0,0.9)`;
   <div style="
    background: #1a1a2e;
    border: 1px solid #444;
    border-radius: 12px;
    padding: 28px 32px;
    width: 360px;
    max-width: 90vw;
    text-align: center;
    objects=[];floatingTexts=[];explosions=[];laughSkulls=[];
  forcefieldActive=false;forcefieldTimer=0;forcefieldCooldown=0;chargeStart=null;chargeLevel=0;
  fireBeamActive=false;fireBeamTimer=0;fireBeamCooldown=0;fireChargeStart=null;fireChargeLevel=0;
  stopFireLoop();stopFFCrackle();ffEngineNode=null;fireEngineNode=null;
  spawnTimer=0;spawnDelay=rnd(3000,5000);lastTime=null;logEntries=[];gameElapsed=0;
     const endAngle=-Math.PI/2+comboFill*Math.PI*2;
      ctx.beginPath();ctx.arc(cx,cy,outerR,-Math.PI/2,endAngle);
      ctx.strokeStyle=col;ctx.lineWidth=thick;ctx.lineCap='round';ctx.globalAlpha=0.85;ctx.stroke();
      const pulse=0.3+Math.sin(ts/200)*0.2;
ctx.fillStyle='#200';ctx.beginPath();ctx.arc(-4,-3,1.3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(4,-3,1.3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=dc;ctx.beginPath();ctx.ellipse(0,1,2.5,1.5,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=hn;ctx.lineWidth=1.2;ctx.beginPath();ctx.moveTo(-5,5);ctx.quadraticCurveTo(0,st?12:angry?10:8,5,5);ctx.stroke();
  ctx.fillStyle='#eee';ctx.beginPath();ctx.rect(-4.5,5,2.5,2.5);ctx.fill();ctx.beginPath();ctx.rect(-1,5,2,2.5);ctx.fill();ctx.beginPath();ctx.rect(2,5,2.5,2.5);ctx.fill();
</div>
</body>
</html>
